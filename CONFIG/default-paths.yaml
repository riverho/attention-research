research_root: "~/.openclaw/workspace/notes/research-v2"
skill_root: "~/.openclaw/skills/attention-research"
cron_jobs: "~/.openclaw/cron/jobs.json"
heartbeat_state: "~/.openclaw/workspace/memory/heartbeat-state.json"

delivery:
  default_channel: "telegram"
  telegram:
    chat_id: ""
  whatsapp:
    recipient: ""

search:
  provider: "tavily"
  max_results: 8
  morning_time_range: "day"
  afternoon_time_range: "day"

retry:
  max_retries: 2
  backoff_seconds: 30

config_version: "1.0.0"